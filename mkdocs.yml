site_name: AgentSentinel
site_description: Auto-approve tool requests for AI coding CLIs running in tmux
site_url: https://plexusone.github.io/agentsentinel
repo_url: https://github.com/plexusone/agentsentinel
repo_name: plexusone/agentsentinel

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
      - Requirements: getting-started/requirements.md
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Usage:
      - Commands: usage/commands.md
      - Configuration: usage/configuration.md
      - Multi-Agent Workflows: usage/multi-agent.md
  - Reference:
      - Pattern Reference: reference/patterns.md
      - Safety Features: reference/safety.md
      - Architecture: reference/architecture.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Releases:
      - v0.2.0: releases/v0.2.0.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/agentsentinel
